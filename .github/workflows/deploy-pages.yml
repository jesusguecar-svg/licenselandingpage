name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages sirve desde la rama gh-pages; este job la mantiene
      # sincronizada con main en cada push.
      - name: Publish main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add .nojekyll
          git commit -m "Deploy ${GITHUB_SHA} to gh-pages" || true
          git push origin HEAD:gh-pages --force
